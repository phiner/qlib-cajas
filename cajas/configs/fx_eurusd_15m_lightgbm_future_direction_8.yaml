name: fx_eurusd_15m_lightgbm_future_direction_8
description: >
  Draft market recognition research config for EURUSD 15m future_direction_8.
  This config is training-disabled in Phase 11.

research_scope:
  market_recognition_only: true
  trading_signal: false
  live_trading: false
  backtest_profit_analysis: false

data_adapter:
  csv_path: tmp/cajas/eurusd_15m_phase1/prepared_dataset.csv
  label_col: future_direction_8
  handler_class: cajas.handlers.prepared_csv_handler.PreparedCsvHandler
  dataset_class: cajas.datasets.prepared_dataset.PreparedDataset
  leakage_columns:
    - future_close_8
    - future_return_8
  segments:
    train:
      start: "2025-01-01"
      end: "2025-08-31"
    valid:
      start: "2025-09-01"
      end: "2025-10-31"
    test:
      start: "2025-11-01"
      end: "2025-12-31"

workflow_bridge:
  class: cajas.workflows.prepared_workflow.PreparedWorkflow
  config_class: cajas.workflows.prepared_workflow.PreparedWorkflowConfig
  dry_run_only: true

model:
  draft_class: LightGBM
  enabled: false
  note: "Model training is disabled in Phase 9."

training:
  enabled: false
  reason: "Phase 7 validates config/workflow dry-run and optional local artifacts."

artifacts:
  enabled: false
  default_output_dir: tmp/cajas/experiment_dry_runs
  default_run_name: phase7_eurusd_15m_dry_run
  generated_files:
    - run_manifest.json
    - config_snapshot.json
    - workflow_summary.json
    - validation_report.json

readiness:
  enabled: true
  training_must_be_disabled: true
  expected_label_classes:
    - down
    - flat
    - up
  rare_class_min_count: 10
  fail_on_feature_leakage: true
  fail_on_non_numeric_features: true
  strict_warnings: false

qlib:
  core_modified: false
  provider_format_enabled: false
  note: "No Qlib core provider integration is performed in Phase 7."

baseline_plan:
  enabled: true
  model_family: LightGBM
  task_type: multiclass_classification
  target_label: future_direction_8
  training_allowed: false
  training_executed: false
  required_optional_dependencies:
    - sklearn
    - lightgbm
  artifacts:
    default_output_dir: tmp/cajas/baseline_plans
    default_run_name: phase9_baseline_plan
    generated_files:
      - baseline_plan_report.json

baseline_scaffold:
  enabled: true
  training_allowed: false
  training_executed: false
  model_family: LightGBM
  task_type: multiclass_classification
  label_encoding_plan:
    down: 0
    flat: 1
    up: 2
  artifacts:
    default_output_dir: tmp/cajas/baseline_scaffolds
    default_run_name: phase10_baseline_scaffold
    generated_files:
      - baseline_scaffold_report.json

baseline_preflight:
  enabled: true
  phase: phase11
  phase_policy_allows_training: false
  can_train_now: false
  training_executed: false
  path_hygiene:
    forbidden_patterns:
      - caixas/
      - taskDocs/
  artifacts:
    default_output_dir: tmp/cajas/baseline_preflight
    default_run_name: phase11_baseline_preflight
    generated_files:
      - baseline_preflight_report.json
      - baseline_execution_contract.json
