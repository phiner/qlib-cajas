name: fx_eurusd_15m_lightgbm_future_direction_8
description: >
  Draft market recognition research config for EURUSD 15m future_direction_8.
  This config is training-disabled in Phase 12.

research_scope:
  market_recognition_only: true
  trading_signal: false
  live_trading: false
  backtest_profit_analysis: false

data_adapter:
  csv_path: tmp/cajas/eurusd_15m_phase1/prepared_dataset.csv
  label_col: future_direction_8
  handler_class: cajas.handlers.prepared_csv_handler.PreparedCsvHandler
  dataset_class: cajas.datasets.prepared_dataset.PreparedDataset
  leakage_columns:
    - future_close_8
    - future_return_8
  segments:
    train:
      start: "2025-01-01"
      end: "2025-08-31"
    valid:
      start: "2025-09-01"
      end: "2025-10-31"
    test:
      start: "2025-11-01"
      end: "2025-12-31"

workflow_bridge:
  class: cajas.workflows.prepared_workflow.PreparedWorkflow
  config_class: cajas.workflows.prepared_workflow.PreparedWorkflowConfig
  dry_run_only: true

model:
  draft_class: LightGBM
  enabled: false
  note: "Model training is disabled in Phase 9."

training:
  enabled: false
  reason: "Phase 12 keeps baseline command scaffold blocked before model construction."

artifacts:
  enabled: false
  default_output_dir: tmp/cajas/experiment_dry_runs
  default_run_name: phase7_eurusd_15m_dry_run
  generated_files:
    - run_manifest.json
    - config_snapshot.json
    - workflow_summary.json
    - validation_report.json

readiness:
  enabled: true
  training_must_be_disabled: true
  expected_label_classes:
    - down
    - flat
    - up
  rare_class_min_count: 10
  fail_on_feature_leakage: true
  fail_on_non_numeric_features: true
  strict_warnings: false

qlib:
  core_modified: false
  provider_format_enabled: false
  note: "No Qlib core provider integration is performed in Phase 7."

baseline_plan:
  enabled: true
  model_family: LightGBM
  task_type: multiclass_classification
  target_label: future_direction_8
  training_allowed: false
  training_executed: false
  required_optional_dependencies:
    - sklearn
    - lightgbm
  artifacts:
    default_output_dir: tmp/cajas/baseline_plans
    default_run_name: phase9_baseline_plan
    generated_files:
      - baseline_plan_report.json

baseline_scaffold:
  enabled: true
  training_allowed: false
  training_executed: false
  model_family: LightGBM
  task_type: multiclass_classification
  label_encoding_plan:
    down: 0
    flat: 1
    up: 2
  artifacts:
    default_output_dir: tmp/cajas/baseline_scaffolds
    default_run_name: phase10_baseline_scaffold
    generated_files:
      - baseline_scaffold_report.json

baseline_preflight:
  enabled: true
  phase: phase11
  phase_policy_allows_training: false
  can_train_now: false
  training_executed: false
  path_hygiene:
    forbidden_patterns:
      - caixas/
      - taskDocs/
  artifacts:
    default_output_dir: tmp/cajas/baseline_preflight
    default_run_name: phase11_baseline_preflight
    generated_files:
      - baseline_preflight_report.json
      - baseline_execution_contract.json

baseline_disabled_run:
  enabled: true
  phase: phase12
  phase_policy_allows_training: false
  can_train: false
  training_executed: false
  model_built: false
  predictions_generated: false
  evaluation_executed: false
  serialized_model: false
  note: "Future training command skeleton only; blocked before model construction."
  produces_trading_signal: false
  artifacts:
    default_output_dir: tmp/cajas/baseline_disabled_runs
    default_run_name: phase12_baseline_disabled
    generated_files:
      - baseline_blocked_run_report.json
      - baseline_run_contract.json

future_training_skeleton:
  enabled: true
  phase: phase13
  user_training_approval: false
  phase_policy_allows_training: false
  can_enable_training: false
  can_train_now: false
  training_executed: false
  model_built: false
  fit_executed: false
  prediction_executed: false
  evaluation_executed: false
  serialization_executed: false
  note: "Future training skeleton only; Phase 13 intentionally blocks before model construction."
  cli_enable_training_flag_exposed: false
  produces_trading_signal: false
  artifacts:
    default_output_dir: tmp/cajas/future_training_skeletons
    default_run_name: phase13_future_training_skeleton
    generated_files:
      - future_training_skeleton_report.json
      - training_enable_contract.json

training_input_preview:
  enabled: true
  phase: phase14
  label_encoding:
    future_direction_8:
      down: 0
      flat: 1
      up: 2
  metrics:
    task_type: multiclass_classification
    primary_metric: macro_f1
    enabled_metrics:
      - accuracy
      - macro_f1
      - weighted_f1
      - per_class_precision
      - per_class_recall
      - confusion_matrix
      - class_distribution
    forbidden_metrics:
      - profit
      - return
      - sharpe
      - drawdown
  artifacts:
    default_output_dir: tmp/cajas/training_input_previews
    default_run_name: phase14_training_inputs_preview
    generated_files:
      - training_input_materialization_report.json
      - label_encoding_preview.json
      - metric_plan.json

qlib_compatibility:
  enabled: true
  phase: phase15
  require_qlib_import: false
  initialize_qlib: false
  modify_qlib_core: false
  dataset_h_shape_probe:
    enabled: true
    compatible_shape_required: true
  artifacts:
    default_output_dir: tmp/cajas/qlib_compat
    default_run_name: phase15_qlib_dataset_compat
    generated_files:
      - qlib_dataset_compat_report.json
      - qlib_import_status.json
