name: fx_eurusd_15m_lightgbm_future_direction_8
description: >
  Draft market recognition research config for EURUSD 15m future_direction_8.
  This config is training-disabled in Phase 7.

research_scope:
  market_recognition_only: true
  trading_signal: false
  live_trading: false
  backtest_profit_analysis: false

data_adapter:
  csv_path: tmp/cajas/eurusd_15m_phase1/prepared_dataset.csv
  label_col: future_direction_8
  handler_class: cajas.handlers.prepared_csv_handler.PreparedCsvHandler
  dataset_class: cajas.datasets.prepared_dataset.PreparedDataset
  leakage_columns:
    - future_close_8
    - future_return_8
  segments:
    train:
      start: "2025-01-01"
      end: "2025-08-31"
    valid:
      start: "2025-09-01"
      end: "2025-10-31"
    test:
      start: "2025-11-01"
      end: "2025-12-31"

workflow_bridge:
  class: cajas.workflows.prepared_workflow.PreparedWorkflow
  config_class: cajas.workflows.prepared_workflow.PreparedWorkflowConfig
  dry_run_only: true

model:
  draft_class: LightGBM
  enabled: false
  note: "Model training is disabled in Phase 6."

training:
  enabled: false
  reason: "Phase 7 validates config/workflow dry-run and optional local artifacts."

artifacts:
  enabled: false
  default_output_dir: tmp/cajas/experiment_dry_runs
  default_run_name: phase7_eurusd_15m_dry_run
  generated_files:
    - run_manifest.json
    - config_snapshot.json
    - workflow_summary.json
    - validation_report.json

qlib:
  core_modified: false
  provider_format_enabled: false
  note: "No Qlib core provider integration is performed in Phase 7."
