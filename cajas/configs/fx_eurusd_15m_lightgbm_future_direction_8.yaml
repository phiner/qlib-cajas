# Draft only. This config documents the intended Qlib integration shape.
# Phase 3 status: draft contract only; do not run model training yet.
# Data source is the Phase 1 prepared CSV.
# Handler target: cajas.handlers.prepared_csv_handler.PreparedCsvHandler
# Leakage columns future_close_8 and future_return_8 are audit-only (not features).
# No trading strategy, no live execution.
meta:
  experiment_name: fx_eurusd_15m_lightgbm_future_direction_8_phase3_draft
  research_layer: cajas
  note: "Research config draft only; no training in Phase 3."

market:
  symbol: EURUSD
  timeframe: 15m

task:
  name: market_recognition_future_direction_classification
  label_column: future_direction_8
  horizon: 8
  label_semantics: "up if future_return_8 > 0, down if future_return_8 < 0, flat otherwise"
  classes: [up, flat, down]

dataset:
  prepared_csv_path: tmp/cajas/eurusd_15m_phase1/prepared_dataset.csv
  handler_target: cajas.handlers.prepared_csv_handler.PreparedCsvHandler
  datetime_column: datetime
  symbol_column: symbol
  timeframe_column: timeframe
  TODO_integration:
    - map this draft to a Qlib-compatible DatasetH wrapper in a later phase
    - validate DatasetH-like prepare semantics before any training
  split:
    train: ["2025-01-01", "2025-08-31"]
    valid: ["2025-09-01", "2025-10-31"]
    test: ["2025-11-01", "2025-12-31"]

model:
  family: lightgbm
  objective: multiclass
  num_class: 3
  metric: multi_logloss
  params:
    learning_rate: 0.05
    num_leaves: 31
    feature_fraction: 0.9
    bagging_fraction: 0.9
    bagging_freq: 5
    min_data_in_leaf: 50

features:
  leakage_excluded:
    - future_close_8
    - future_return_8
  columns:
    - return_1
    - log_return_1
    - hl_range
    - body_size
    - upper_shadow
    - lower_shadow
    - body_ratio
    - close_position_in_range
    - range_pct
    - volume_change_1
    - return_mean_4
    - return_mean_8
    - return_mean_16
    - return_std_8
    - return_std_16
    - range_mean_8
    - range_mean_16

disclaimer:
  - this is a research config draft
  - no training should be run in phase 3
  - for market recognition only
  - not a trading strategy
  - not a production signal
